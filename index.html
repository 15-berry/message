<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>PDF自動更新リスト</title>
    <style>
        body { font-family: sans-serif; padding: 40px; background: #f9f9f9; }
        .container { max-width: 600px; margin: 0 auto; background: white; padding: 20px; border-radius: 8px; shadow: 0 2px 5px rgba(0,0,0,0.1); }
        h1 { font-size: 1.2rem; color: #333; border-bottom: 2px solid #007bff; padding-bottom: 10px; }
        #file-list { list-style: none; padding: 0; }
        .file-item { display: flex; justify-content: space-between; align-items: center; padding: 10px; border-bottom: 1px solid #eee; }
        .file-name { color: #555; text-decoration: none; flex-grow: 1; }
        .file-name:hover { color: #007bff; }
        .download-link { background: #007bff; color: white; padding: 5px 10px; border-radius: 4px; font-size: 0.8rem; text-decoration: none; }
        .download-link:hover { background: #0056b3; }
    </style>
</head>
<body>

<div class="container">
    <h1>共有ファイル一覧</h1>
    <ul id="file-list">
        <li>読み込み中...</li>
    </ul>
</div>

<script>
    // 自分の環境に合わせてここを書き換えてください
    const USERNAME = '15-berry';
    const REPO = 'message';
    const PATH = 'pdf'; // PDFを入れているフォルダ名

    async function fetchFiles() {
        const url = `https://api.github.com/repos/${USERNAME}/${REPO}/contents/${PATH}`;
        
        try {
            const response = await fetch(url);
            const files = await response.json();
            const listElement = document.getElementById('file-list');
            listElement.innerHTML = ''; // ローディング表示を消去

            files.forEach(file => {
                // PDFファイルのみを抽出
                if (file.name.endsWith('.pdf')) {
                    const li = document.createElement('li');
                    li.className = 'file-item';
                    
                    // ブラウザで開くリンク
                    const link = document.createElement('a');
                    link.className = 'file-name';
                    link.href = file.download_url;
                    link.target = '_blank';
                    link.textContent = file.name;

                    // ダウンロードボタン
                    const dl = document.createElement('a');
                    dl.className = 'download-link';
                    dl.href = file.download_url;
                    dl.download = file.name;
                    dl.textContent = '保存';

                    li.appendChild(link);
                    li.appendChild(dl);
                    listElement.appendChild(li);
                }
            });

            if (listElement.innerHTML === '') {
                listElement.innerHTML = '<li>ファイルが見つかりませんでした。</li>';
            }
        } catch (error) {
            console.error('エラー:', error);
            document.getElementById('file-list').innerHTML = '<li>読み込みエラーが発生しました。</li>';
        }
    }

    fetchFiles();
</script>

</body>
</html>
